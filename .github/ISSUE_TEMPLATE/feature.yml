name: Product or engineering change
description: Propose an outcome with clear acceptance criteria and boundaries.
title: "[Change] "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem and audience
      description: What problem exists, for whom, and why now?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Expected outcome
      description: Describe observable behavior, not a preferred solution.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - Given...
        - When...
        - Then...
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and out of scope
    validations:
      required: true
  - type: checkboxes
    id: risk
    attributes:
      label: Risk considerations
      options:
        - label: Affects security, privacy, or a trust boundary
        - label: Migrates data with risk of loss or unavailability
        - label: Changes a public or persisted contract
        - label: Crosses three or more components
        - label: Involves multiple teams or stages
  - type: textarea
    id: evidence
    attributes:
      label: Completion evidence
      description: How will we know the change works?
