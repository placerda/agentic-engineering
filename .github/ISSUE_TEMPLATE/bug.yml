name: Bug
description: Report incorrect behavior with reproducible evidence.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: "Do not include secrets, tokens, or personal data."
  - type: textarea
    id: problem
    attributes:
      label: Problem and impact
      description: Who is affected and what is the impact?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce
      description: Minimal steps, safe data, and frequency.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result and evidence
      description: Include sanitized messages, version, and environment.
    validations:
      required: true
  - type: textarea
    id: changes
    attributes:
      label: Recent changes or workaround
      description: Report a known regression and safe workaround, if any.

